name: CI/CD Pipeline
on:
    push:
      branches:
        - master
      pull_request:
env:
  IMG: i2seys/flask-app 
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
      fail-fast: false  # Продолжать тесты даже если одна версия упала
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests ${{ matrix.python-version }}
        run: pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Docker Buildx # Сборка (лучше через docker buildx)
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub # Авторизация в Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMG }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - name: Build and push Docker image # Сборка и пуш образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run integration smoke test
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:5000/ || (docker compose logs && exit 1)
          docker compose down
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image tag in manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: i2seys/flask-app:.*|image: ${{ env.IMG }}:${SHORT_SHA}|g" k8s/deployment.yaml
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml --insecure-skip-tls-verify=true
          kubectl apply -f k8s/service.yaml --insecure-skip-tls-verify=true

      - name: Debug pods
        run: |
          echo "=== PODS STATUS ==="
          kubectl get pods -l app=flask-app -o wide --insecure-skip-tls-verify=true
            
          echo "=== PODS EVENTS ==="
          kubectl describe pod -l app=flask-app --insecure-skip-tls-verify=true | grep -A 10 "Events:"
            
          echo "=== CONTAINER LOGS ==="
          for pod in $(kubectl get pods -l app=flask-app -o name --insecure-skip-tls-verify=true); do
            echo "--- Logs for $pod ---"
            kubectl logs $pod --insecure-skip-tls-verify=true || echo "No logs available"
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flask-app --timeout=300s --insecure-skip-tls-verify=true

      - name: Smoke test
        run: |
          kubectl wait --for=condition=available deployment/flask-app --timeout=300s